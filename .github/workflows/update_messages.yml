env:
    PYTHON_VERSION: '3.9'
    QT_VERSION: '6.8.3'
    TCL_VERSION: '8.6'

name: Update messages

on:
    workflow_dispatch:
        inputs:
    schedule:
        - cron: '30 5 * * *' # run at 5:30 AM UTC every day

jobs:
    build:
        runs-on: ubuntu-22.04

        steps:
            - name: Install Qt tools
              run: |
                sudo apt-get update
                sudo apt-get install -y qt6-tools-dev-tools

            - name: Clone repo
              uses: actions/checkout@v4
              with:
                ref: ${{ env.GITHUB_REF }}

            - name: Update translations
              run: |
                set -euo pipefail
                echo "Using lupdate: $(which lupdate) ($(lupdate -version))"

                dirs=()

                for p in core gui letos letoscli
                do
                    dirs+=("Letos/$p")
                done

                for d in Plugins/*
                do
                    [ -d "$d" ] || continue
                    dirs+=("$d")
                done

                for d in "${dirs[@]}"
                do
                    [ -d "$d"/translations ] || continue
                    lupdate "$d" -ts "$d"/translations/*.ts -locations none -no-obsolete

                    find "$d"/translations -name "*.ts" | while read f; do
                        lconvert -sort-contexts -o "$f.tmp" "$f"
                        mv "$f.tmp" "$f"
                    done
                done

            - name: Listing Git status
              run: |
                git status
                echo "==========================================================================="
                git diff

            - name: Committing changes
              run: |
                # git config user.name github-actions
                # git config user.email github-actions@github.com
                # git add .
                # git diff-index --quiet HEAD || git commit -m "Automated update of translation files."
                # git push
